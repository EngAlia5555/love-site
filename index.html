<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #2b0000, #000000);
  color: white;
}

/* Intro */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a0000, black);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
}

#intro button {
  padding: 14px 24px;
  border: none;
  border-radius: 15px;
  background: pink;
  color: black;
  font-weight: bold;
  font-size: 18px;
  cursor: pointer;
  box-shadow: 0 0 25px pink;
  transition: 0.3s;
}

#intro button:hover {
  transform: scale(1.1);
}

/* Text */
h1 {
  text-align: center;
  font-size: 52px;
  z-index: 2;
  text-shadow: 0 0 20px red, 0 0 40px pink;
  animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-12px); }
}

/* Hearts */
.heart {
  position: absolute;
  font-size: 20px;
  animation: floatUp linear forwards;
  filter: drop-shadow(0 0 10px red);
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.7);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- Intro -->
<div id="intro">
  <button onclick="startSite()">💖 Open Your Surprise 💖</button>
</div>

<!-- Main text -->
<h1>بحبك ❤️<br>عمرو</h1>

<!-- Romantic audio -->
<audio id="song" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c6b2b8c7e.mp3?filename=romantic-love-ambient-110397.mp3" type="audio/mpeg">
</audio>

<script>
function startSite() {
  document.getElementById("intro").style.display = "none";

  // play music
  const song = document.getElementById("song");
  song.play();

  // start hearts
  setInterval(createHeart, 120);
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");

  const colors = ["#ff0000", "#ff4d6d", "#ff85a2"];
  heart.innerHTML = "❤️";
  heart.style.color = colors[Math.floor(Math.random() * colors.length)];

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 4 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}
</script>

</body>
</html>
