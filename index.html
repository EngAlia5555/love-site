<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  height: 100vh;
  font-family: 'Arial', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #2b0000, #000000);
  color: white;
}

/* Intro overlay */
#intro {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
  cursor: pointer;
}

#intro h2 {
  font-size: 22px;
  color: pink;
  text-align: center;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 25px pink; }
}

h1 {
  text-align: center;
  font-size: 48px;
  z-index: 2;
  text-shadow: 0 0 20px red, 0 0 40px pink;
  animation: floatText 3s ease-in-out infinite;
}

@keyframes floatText {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-10px); }
}

.heart {
  position: absolute;
  color: red;
  font-size: 18px;
  animation: floatUp linear forwards;
  filter: drop-shadow(0 0 10px red);
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.6);
    opacity: 0;
  }
}

button {
  margin-top: 15px;
  padding: 10px 18px;
  border: none;
  border-radius: 10px;
  background: pink;
  color: black;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- Intro screen -->
<div id="intro" onclick="startSite()">
  <h2>💖 Click anywhere to open your surprise 💖</h2>
</div>

<h1>بحبك ❤️<br>– عمرو</h1>

<!-- Hidden audio (better than YouTube iframe) -->
<audio id="song" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
let started = false;

function startSite() {
  if (started) return;
  started = true;

  document.getElementById("intro").style.display = "none";

  // play audio
  const song = document.getElementById("song");
  song.play();

  // start hearts
  setInterval(createHeart, 120);
}

function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 4 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => heart.remove(), 8000);
}
</script>

</body>
</html>
