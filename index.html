<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: radial-gradient(circle, #1a0000, black);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
  color: white;
}

h1 {
  position: absolute;
  text-align: center;
  font-size: 45px;
  z-index: 2;
  text-shadow: 0 0 20px red, 0 0 40px pink;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px red; }
  to { text-shadow: 0 0 30px pink; }
}

.heart {
  position: absolute;
  color: red;
  font-size: 20px;
  animation: floatUp linear infinite;
  filter: drop-shadow(0 0 10px red);
}

@keyframes floatUp {
  0% {
    transform: translateY(100vh) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) scale(1.5);
    opacity: 0;
  }
}
</style>
</head>

<body>

<h1>بحبك ❤️<br>– عمرو</h1>

<!-- أغنية -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/0k9m3tZK4r8?autoplay=1&loop=1&playlist=0k9m3tZK4r8"
frameborder="0" allow="autoplay"></iframe>

<script>
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";

  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 25 + 15) + "px";
  heart.style.animationDuration = (Math.random() * 4 + 3) + "s";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 7000);
}

setInterval(createHeart, 150);
</script>

</body>
  </html>
